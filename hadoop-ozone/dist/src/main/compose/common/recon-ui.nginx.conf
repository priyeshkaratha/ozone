# Developer-only reverse proxy that makes the Recon web UI browsable in the
# secure (Kerberos) compose cluster without per-user SPNEGO setup.
#
# In secure mode Recon authenticates web requests and authorizes them against
# ozone.administrators / ozone.recon.administrators.  A browser cannot perform
# SPNEGO without a Kerberos ticket and per-browser Negotiate configuration, so
# the UI is unreachable out of the box.
#
# This proxy fronts Recon (which is switched to "simple" HTTP auth by
# recon-ui.yaml) and appends an admin identity (user.name=testuser) to every
# request, so the SPA and its /api/v1 calls are served with real data.  Recon
# still enforces authorization: a request without this identity gets 401 and a
# non-admin identity gets 403.  This is for local development only.

worker_processes 1;

events {
  worker_connections 256;
}

http {
  upstream recon_backend {
    server recon:9888;
  }

  # Append the admin identity, preserving any query string the UI already sends.
  map $args $recon_args {
    ""      "user.name=testuser";
    default "$args&user.name=testuser";
  }

  server {
    listen 9888;

    location / {
      proxy_pass http://recon_backend$uri?$recon_args;
      proxy_set_header Host $host;
      proxy_http_version 1.1;
    }
  }
}
