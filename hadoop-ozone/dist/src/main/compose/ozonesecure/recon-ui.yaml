# Opt-in overlay that makes the Recon web UI browsable in the secure cluster.
#
#   docker-compose -f docker-compose.yaml -f recon-ui.yaml up -d
#
# then open http://localhost:9888 in a browser (no kinit required).
#
# This is NOT loaded by the acceptance tests (test.sh uses docker-compose.yaml
# only), so the tested cluster keeps Recon on Kerberos/SPNEGO.  See README.md.
services:
  # Switch Recon's HTTP auth to "simple"; the recon-ui proxy supplies the admin
  # identity.  All other services (OM, SCM, datanode, S3G) stay on Kerberos.
  recon:
    ports: !reset []
    environment:
      OZONE_OPTS:
      OZONE-SITE.XML_ozone.recon.http.auth.type: simple

  # Reverse proxy that injects an admin user.name so the browser does not need
  # a Kerberos ticket.  Publishes the Recon UI port in place of Recon itself.
  recon-ui:
    image: nginx:alpine
    hostname: recon-ui
    dns_search: .
    ports:
      - 9888:9888
    volumes:
      - ../common/recon-ui.nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - recon
